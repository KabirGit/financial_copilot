version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - model_cache:/app/.cache
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080

  ui:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8080
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  qdrant_data:
  model_cache:
